<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0F0F13">
<meta name="color-scheme" content="light dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="google-site-verification" content="G5cM83TAmDMQ01Q4iaAEMiq3d8Q4pE5UeN5ljGJ50uk" />

<title>NearPop — Discover Local Deals, Rentals & Jobs Instantly</title>
<meta name="title" content="NearPop — Discover Local Deals, Rentals & Jobs Instantly">
<meta name="description" content="Turn on your GPS and find the best hyper-local shop discounts, flats, PGs, and jobs near you in real-time. Explore your neighborhood with NearPop.">

<meta name="robots" content="index, follow">
<link rel="canonical" href="https://nearpop.in/">

<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').catch(err => console.log('SW failed', err));
    });
  }
</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@500;600;700;800;900&family=Syne:wght@700;800&display=swap">
<link rel="stylesheet" href="css/shared.css">
<style>
  body { 
    display:flex; 
    flex-direction:column; 
    align-items:center; 
    justify-content:center; 
    min-height:100vh; 
    min-height:100dvh; 
    background-color: var(--bg-body); 
    padding:16px; 
    overflow:hidden; 
    position: relative;
    margin: 0;
  }
  
  .premium-bg {
    position: fixed; 
    inset: 0; 
    z-index: 0; 
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    transition: background-image 1s ease-in-out;
  }
  
  .premium-bg::after {
    content: ''; 
    position: absolute; 
    inset: 0;
    background: rgba(0, 0, 0, 0.4); 
    z-index: 1;
  }

  .card { 
    width:100%; 
    max-width:400px; 
    border-radius:28px; 
    padding:40px 24px; 
    text-align:center; 
    position:relative; 
    z-index: 10; 
    background-color: rgba(255, 255, 255, 0.85); 
    backdrop-filter: blur(30px); 
    -webkit-backdrop-filter: blur(30px); 
    box-shadow: 0 30px 60px rgba(0,0,0,0.2), 0 0 0 1px rgba(255,255,255,0.4) inset; 
    border: none; 
    animation: slideUpFade 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  
  @keyframes slideUpFade {
    from { opacity: 0; transform: translateY(30px); }
    to { opacity: 1; transform: translateY(0); }
  }
  
  @media (prefers-color-scheme: dark) {
    .premium-bg::after { background: rgba(0, 0, 0, 0.6); }
    .card { background-color: rgba(15, 15, 19, 0.75); box-shadow: 0 30px 60px rgba(0,0,0,0.6), 0 0 0 1px rgba(255,255,255,0.08) inset; }
  }
  
  .brand { display:flex; align-items:center; justify-content:center; gap:10px; margin-bottom:12px; }
  .tagline { font-size:14px; color:var(--gray); font-weight:600; margin-bottom:30px; line-height:1.4; }
  
  .role-tog { 
    display:flex; 
    position: relative; 
    background:var(--cream); 
    border-radius:14px; 
    padding:4px; 
    margin-bottom:24px; 
    border:1px solid var(--bdr); 
    z-index: 1;
  }
  
  .sliding-pill {
    position: absolute;
    top: 4px;
    bottom: 4px;
    left: 4px;
    width: calc(50% - 4px);
    background: var(--bg-app);
    border-radius: 10px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    z-index: -1;
  }

  .rtb { 
    flex:1; 
    padding:10px; 
    font-size:13px; 
    font-weight:800; 
    color:var(--gray); 
    border-radius:10px; 
    cursor:pointer; 
    transition: color 0.2s; 
    background: transparent; 
  }
  
  .rtb.on { color:var(--deep); }

  .btn-google { display:flex; align-items:center; justify-content:center; gap:12px; width:100%; padding:14px; border-radius:12px; background:var(--bg-app); color:var(--deep); font-size:15px; font-weight:800; border:2px solid var(--bdr); cursor:pointer; transition:all 0.2s; font-family:inherit; box-shadow:0 4px 15px rgba(0,0,0,0.06); }
  .btn-google:active { transform:scale(0.97); background:var(--cream); }
  .btn-google img { width:20px; height:20px; transition: opacity 0.2s; }

  @keyframes inline-spin { 100% { transform: rotate(360deg); } }

  .checkbox-wrapper { display:flex; align-items:flex-start; gap:10px; margin-bottom:20px; text-align:left; padding:0 4px; }
  .custom-checkbox { width:20px; height:20px; accent-color:#FF5722; cursor:pointer; flex-shrink:0; margin-top:2px; background-color:#ffffff; box-shadow:0 0 0 2px #9CA3AF; border-radius:3px; outline:none; -webkit-appearance:auto; transition: transform 0.2s; }
  .custom-checkbox:active { transform: scale(0.9); }
  
  .qr-highlight { color:#FF5722; font-size:18px; font-weight:900; }
</style>
</head>
<body>

<div class="premium-bg" id="dynamic-bg"></div>

<div class="card" id="login-card">
  <div class="brand" style="margin-bottom: 20px;">
    <img src="icons/logo.png" alt="NearPop Logo" style="max-height: 64px; width: auto; filter: drop-shadow(0 4px 12px rgba(0,0,0,0.1));">
  </div>
  <div class="tagline" id="tag-line">Sign in to discover nearby deals instantly.</div>

  <div class="role-tog" id="role-box">
    <div class="sliding-pill" id="role-pill"></div>
    <div class="rtb on" id="rt-con" onclick="setRole('consumer')">📱 Customer</div>
    <div class="rtb" id="rt-mer" onclick="setRole('merchant')">🏪 Merchant</div>
  </div>

  <div class="checkbox-wrapper">
    <input type="checkbox" id="agree-check" class="custom-checkbox">
    <label for="agree-check" style="font-size:12px; color:var(--deep); line-height:1.5; cursor:pointer; font-weight:600;">
      By checking this, you agree to NearPop's 
      <a href="terms.html" style="color:#FF5722; font-weight:800; text-decoration:underline;">Terms</a> & 
      <a href="privacy.html" style="color:#FF5722; font-weight:800; text-decoration:underline;">Privacy</a>.
    </label>
  </div>
  
  <button class="btn-google" id="btn-login" onclick="window.loginWithGoogle()">
    <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" id="btn-google-icon" alt="Google">
    <svg id="btn-spinner" style="display:none; width:20px; height:20px; animation: inline-spin 1s linear infinite;" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" stroke-dasharray="32" stroke-linecap="round" stroke-opacity="0.3"></circle>
      <path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"></path>
    </svg>
    <span id="btn-login-text">Continue with Google</span>
  </button>

  <div style="margin-top: 24px; font-size: 11px; color: var(--gray); text-align: center; font-weight:600;">
    © 2026 NearPop. All rights reserved.
  </div>
</div>

<div class="toast" id="toast"><span id="t-ic">✅</span><span id="t-tx"></span></div>

<script>
  function setTimeBasedBackground() {
    const hour = new Date().getHours();
    const bgElement = document.getElementById('dynamic-bg');
    
    let bgUrl = '';
    
    if (hour >= 6 && hour < 12) {
      bgUrl = 'url("https://images.unsplash.com/photo-1587474260584-136574528ed5?q=80&w=1080&auto=format&fit=crop")';
    } else if (hour >= 12 && hour < 18) {
      bgUrl = 'url("https://images.unsplash.com/photo-1677306966234-367c40e489bf?q=80&w=1080&auto=format&fit=crop")';
    } else {
      bgUrl = 'url("https://images.unsplash.com/photo-1710338836955-24e16f13c1a9?q=80&w=1080&auto=format&fit=crop")';
    }
    
    bgElement.style.backgroundImage = bgUrl;
  }
  
  setTimeBasedBackground();
</script>

<script type="module">
import { db, LS, SS, toast, cacheClear } from './js/app.js';
import { sanitizer } from './js/sanitizer.js';
import { getAuth, GoogleAuthProvider, signInWithPopup, signInWithCredential } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-auth.js";
import { doc, getDoc, setDoc, updateDoc, increment } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-firestore.js";
import { app } from './js/app.js';

// ✅ Detect if running in native Android app (checks both flag and user agent)
const isNativeAndroid = window.isNativeAndroidApp || navigator.userAgent.includes('NearPopNativeAndroid') || false;
const hasNativeAuth = window.NativeAndroid && typeof window.NativeAndroid.signInWithGoogle === 'function';
console.log('[Auth] Native Android:', isNativeAndroid, 'Native Auth Available:', hasNativeAuth);

// If already logged in, redirect smoothly
if (LS('uid')) { 
  const savedIntent = sessionStorage.getItem('np_intent');
  if (savedIntent) {
    sessionStorage.removeItem('np_intent');
    window.location.href = savedIntent;
  } else {
    window.location.href = LS('role') === 'merchant' ? 'merchant.html' : 'map.html'; 
  }
}

const auth = getAuth(app);
const provider = new GoogleAuthProvider();
window.loginRole = 'consumer';

window.setRole = (r) => {
  window.loginRole = r;
  document.getElementById('rt-con').classList.toggle('on', r === 'consumer');
  document.getElementById('rt-mer').classList.toggle('on', r === 'merchant');
  
  const pill = document.getElementById('role-pill');
  if(r === 'merchant') {
    pill.style.transform = 'translateX(100%)';
  } else {
    pill.style.transform = 'translateX(0)';
  }
};

const urlP = new URLSearchParams(window.location.search);
if (urlP.get('qr') === '1') {
  // ✅ SECURE: Using textContent instead of innerHTML
  const tagLine = document.getElementById('tag-line');
  tagLine.innerHTML = ''; // Clear first
  
  const highlight = document.createElement('span');
  highlight.className = 'qr-highlight';
  highlight.textContent = 'Store Found! 🏪';
  
  const br = document.createElement('br');
  const msg = document.createTextNode('Sign in to unlock deals and claim visit points.');
  
  tagLine.appendChild(highlight);
  tagLine.appendChild(br);
  tagLine.appendChild(msg);
  
  setRole('consumer');
  document.getElementById('role-box').style.display = 'none'; 
}

function showLdr(msg) {
  const btn = document.getElementById('btn-login');
  document.getElementById('btn-google-icon').style.display = 'none';
  document.getElementById('btn-spinner').style.display = 'block';
  document.getElementById('btn-login-text').textContent = msg;
  btn.style.pointerEvents = 'none';
  btn.style.opacity = '0.9';
}

function resetLdr() {
  const btn = document.getElementById('btn-login');
  document.getElementById('btn-google-icon').style.display = 'block';
  document.getElementById('btn-spinner').style.display = 'none';
  document.getElementById('btn-login-text').textContent = 'Continue with Google';
  btn.style.pointerEvents = 'auto';
  btn.style.opacity = '1';
}

window.loginWithGoogle = async () => {
  if (!document.getElementById('agree-check').checked) {
    return toast('⚠️', 'Please agree to the Terms & Privacy Policy.');
  }

  // ✅ NATIVE ANDROID PATH
  if (isNativeAndroid && hasNativeAuth) {
    console.log('[Auth] Using NATIVE Android Sign-In');
    showLdr('Opening Google Sign-In...');
    window.NativeAndroid.signInWithGoogle();
    return; // Exit here - callback will handle rest
  }
  
  // ✅ WEB BROWSER PATH
  console.log('[Auth] Using WEB Firebase Sign-In');
  try {
    showLdr('Connecting to Google...');
    
    const result = await signInWithPopup(auth, provider);
    const user = result.user; 
    const uid = user.uid; 
    const rawName = user.displayName || 'User';
    const gName = sanitizer.sanitizeText(rawName, { maxLength: 100 });
    
    showLdr('Signing in...');
    
    // ✅ SS() calls moved inside handleUserCreation - only set AFTER role validation passes
    await handleUserCreation(uid, gName, user);

  } catch(e) {
    console.error("Firebase Auth Error:", e);
    toast('❌', 'Login failed. Please try again.');
    resetLdr();
  }
};

// ═══════════════════════════════════════════════════════════════════
// ✅ NATIVE ANDROID CALLBACKS
// ═══════════════════════════════════════════════════════════════════

window.onNativeSignInSuccess = async (userData) => {
  console.log('[Auth] Native sign-in successful:', userData);
  
  try {
    // ✅ CRITICAL: Authenticate web Firebase SDK so Firestore writes work
    if (userData.idToken) {
      const credential = GoogleAuthProvider.credential(userData.idToken);
      await signInWithCredential(auth, credential);
      console.log('[Auth] Web Firebase SDK authenticated ✅');
    }

    const uid = userData.uid;
    const gName = sanitizer.sanitizeText(
      userData.displayName || userData.email.split('@')[0],
      { maxLength: 100 }
    );
    
    showLdr('Signing in...');
    
    // ✅ SS() calls moved inside handleUserCreation - only set AFTER role validation passes
    // photoURL passed as extra param to save after validation
    await handleUserCreation(uid, gName, null, userData.photoURL || null);
    
  } catch (error) {
    console.error('[Auth] Native callback error:', error);
    toast('❌', 'Sign-in processing failed. Please try again.');
    resetLdr();
  }
};

window.onNativeSignInError = (errorMessage) => {
  console.error('[Auth] Native sign-in error:', errorMessage);
  toast('❌', 'Sign-in failed: ' + errorMessage);
  resetLdr();
};

// ═══════════════════════════════════════════════════════════════════
// ✅ SHARED USER CREATION LOGIC (used by both web and native paths)
// ═══════════════════════════════════════════════════════════════════

async function handleUserCreation(uid, gName, firebaseUser, photoURL = null) {
  const userRef = doc(db, 'users', uid);
  const userSnap = await getDoc(userRef);
  const isNewUser = !userSnap.exists(); 
  
  // ── ROLE CONFLICT CHECK ──────────────────────────────────────────
  // Must happen BEFORE writing anything to localStorage.
  // If mismatch: sign out, clear storage, show error, stop.
  if (!isNewUser) {
    const existingRole = userSnap.data().role || 'consumer';
    
    if (existingRole !== window.loginRole) {
      // Sign out Firebase session (web path only)
      if (firebaseUser) {
        await auth.signOut(); 
      }
      // ✅ Clear stale session so refresh doesn't auto-login
      cacheClear();
      resetLdr();
      
      if (existingRole === 'consumer') {
        return toast('⚠️', 'This Google account is registered as a Customer. You cannot log in as a Merchant.');
      } else {
        return toast('⚠️', 'This Google account is registered as a Merchant. You cannot log in as a Customer.');
      }
    }
  }

  // ── ROLE VALIDATED ── Safe to write to localStorage now ──────────
  SS('uid', uid);
  SS('name', gName);
  SS('role', window.loginRole);
  if (photoURL) SS('photoURL', photoURL);

  // Merchant setup
  if (window.loginRole === 'merchant') {
    let bname = gName + "'s Business";
    
    if (isNewUser) {
      const rawBname = prompt('What is your business / shop name?') || bname;
      bname = sanitizer.sanitizeText(rawBname, { maxLength: 100, minLength: 3 });
      if (bname.length < 3) {
        bname = gName + "'s Business";
      }
      SS('mname', bname); 
      SS('wallet', 500); 
      await setDoc(userRef, { 
        name: gName, 
        role: 'merchant', 
        mname: bname, 
        wallet: 500, 
        points: 0, 
        liked: [], 
        createdAt: Date.now() 
      });
    } else {
      if (userSnap.data().mname) { 
        const existingBname = userSnap.data().mname;
        bname = sanitizer.sanitizeText(existingBname, { maxLength: 100 });
        SS('mname', bname); 
      } else { 
        const rawBname = prompt('What is your business / shop name?') || bname;
        bname = sanitizer.sanitizeText(rawBname, { maxLength: 100, minLength: 3 });
        if (bname.length < 3) {
          bname = gName + "'s Business";
        }
        SS('mname', bname); 
        await updateDoc(userRef, { role: 'merchant', mname: bname }); 
      }
      SS('wallet', userSnap.data().wallet !== undefined ? userSnap.data().wallet : 500);
      if (userSnap.data().plan) SS('plan', userSnap.data().plan);
    }
  } else {
    // Consumer setup
    if (isNewUser) {
      await setDoc(userRef, { 
        name: gName, 
        role: 'consumer', 
        wallet: 0, 
        points: 50, 
        liked: [], 
        createdAt: Date.now() 
      });
    }
  }
  
  // QR analytics
  cacheClear();
  const savedIntent = sessionStorage.getItem('np_intent');
  
  const qrMid = urlP.get('mid');
  if (qrMid) {
    try {
      if (isNewUser) {
        await updateDoc(doc(db, 'users', qrMid), { qrNew: increment(1), qrScans: increment(1) });
      } else {
        await updateDoc(doc(db, 'users', qrMid), { qrRet: increment(1), qrScans: increment(1) });
      }
      sessionStorage.setItem('np_qr_logged_' + qrMid, 'true'); 
    } catch (err) { 
      console.warn("Rules blocked analytics:", err); 
    }
  } else if (savedIntent && savedIntent.includes('utm_source=qr_standee')) {
    try {
      const urlStr = savedIntent.startsWith('http') ? savedIntent : window.location.origin + '/' + savedIntent;
      const intentUrl = new URL(urlStr);
      const merchantId = intentUrl.searchParams.get('mid');
      if (merchantId) {
        if (isNewUser) {
          await updateDoc(doc(db, 'users', merchantId), { qrNew: increment(1), qrScans: increment(1) });
        } else {
          await updateDoc(doc(db, 'users', merchantId), { qrRet: increment(1), qrScans: increment(1) });
        }
        sessionStorage.setItem('np_qr_logged_' + merchantId, 'true');
      }
    } catch (err) { 
      console.warn("Rules blocked fallback analytics:", err); 
    }
  }
  
  // Redirect
  if (savedIntent) {
    sessionStorage.removeItem('np_intent');
    window.location.href = savedIntent;
  } else {
    window.location.href = window.loginRole === 'merchant' 
      ? 'merchant.html?v=' + Date.now() 
      : 'map.html?v=' + Date.now();
  }
}

console.log('[Auth] Hybrid login system initialized');
console.log('[Auth] Mode:', isNativeAndroid ? 'NATIVE ANDROID' : 'WEB BROWSER');

</script>
<div style="text-align: center; padding: 15px; font-size: 12px; z-index: 10; position: relative;">
  <a href="/privacy.html" style="color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">Privacy Policy</a>
  <span style="color: rgba(255,255,255,0.5); margin: 0 8px;">|</span>
  <a href="/terms.html" style="color: rgba(255,255,255,0.8); text-decoration: none; font-weight: 700; text-shadow: 0 1px 3px rgba(0,0,0,0.5);">Terms of Service</a>
</div>
</body>
</html>
